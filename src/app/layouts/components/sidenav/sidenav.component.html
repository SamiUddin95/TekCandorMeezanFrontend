<div class="sidenav-menu">

    <a routerLink="/" class="logo">
        <span class="logo logo-light">
          <span class="logo-lg">
            <svg viewBox="0 0 200 70" style="width: 180px; height: auto; display: block; margin: 15px auto 0 auto;">
              <!-- TEK -->
              <text x="0" y="40" font-family="'Open Sans', sans-serif" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="2">TEK-CANDOR</text>
              
              <!-- ( check clearing ) -->
              <text x="100" y="63" font-family="'Open Sans', sans-serif" font-size="12" font-weight="600" fill="rgb(187, 185, 185)" letter-spacing="2" text-anchor="middle">Cheque clearing</text>
            </svg>
          </span>
          <span class="logo-sm">
            <svg width="60" height="35" viewBox="0 0 60 35" style="display: block; margin: 15px auto 0 auto;">
              <text x="30" y="25" font-family="'Open Sans', sans-serif" font-size="16" font-weight="700" fill="rgb(112, 30, 125)" letter-spacing="1" text-anchor="middle">TC</text>
            </svg>
          </span>
        </span>

        <span class="logo logo-dark">
          <span class="logo-lg">
            <svg viewBox="0 0 200 70" style="width: 180px; height: auto; display: block; margin: 15px auto 0 auto;">
              <!-- TEK -->
              <text x="10" y="40" font-family="'Open Sans', sans-serif" font-size="28" font-weight="700" fill="rgb(112, 30, 125)" letter-spacing="2">TEK</text>
              
              <!-- Sun Circle -->
              <circle cx="75" cy="28" r="14" fill="rgb(112, 30, 125)" stroke="rgb(112, 30, 125)" stroke-width="2"/>
              <circle cx="75" cy="28" r="7" fill="#ffffff"/>
              <!-- Sun rays -->
              <line x1="75" y1="10" x2="75" y2="14" stroke="#ffffff" stroke-width="2"/>
              <line x1="75" y1="42" x2="75" y2="46" stroke="#ffffff" stroke-width="2"/>
              <line x1="57" y1="28" x2="61" y2="28" stroke="#ffffff" stroke-width="2"/>
              <line x1="89" y1="28" x2="93" y2="28" stroke="#ffffff" stroke-width="2"/>
              <line x1="61" y1="14" x2="65" y2="18" stroke="#ffffff" stroke-width="2"/>
              <line x1="89" y1="38" x2="93" y2="42" stroke="#ffffff" stroke-width="2"/>
              <line x1="93" y1="14" x2="89" y2="18" stroke="#ffffff" stroke-width="2"/>
              <line x1="65" y1="38" x2="61" y2="42" stroke="#ffffff" stroke-width="2"/>
              
              <!-- CANDOR -->
              <text x="95" y="40" font-family="'Open Sans', sans-serif" font-size="28" font-weight="700" fill="rgb(112, 30, 125)" letter-spacing="2">CANDOR</text>
              
              <!-- ( check clearing ) -->
              <text x="88" y="63" font-family="'Open Sans', sans-serif" font-size="12" font-weight="600" fill="rgb(187, 185, 185)" letter-spacing="2" text-anchor="middle">( check clearing )</text>
            </svg>
          </span>
          <span class="logo-sm">
            <svg width="60" height="35" viewBox="0 0 60 35" style="display: block; margin: 15px auto 0 auto;">
              <text x="30" y="25" font-family="'Open Sans', sans-serif" font-size="16" font-weight="700" fill="rgb(112, 30, 125)" letter-spacing="1" text-anchor="middle">TC</text>
            </svg>
          </span>
        </span>
    </a>

    <!-- Sidebar Hover Menu Toggle Button -->
    <button (click)="hoverSidebar()" class="button-on-hover">
        <ng-icon name="tablerMenu4" size="22" class="align-middle"/>
    </button>

    <!-- Offcanvas Sidebar Menu Close Button -->
    <button (click)="closeSidebar()" class="button-close-offcanvas">
        <ng-icon name="tablerX" class="align-middle"/>
    </button>

    <ngx-simplebar id="sidenav" class="scrollbar mt-5">
        <app-menu/>
    </ngx-simplebar>
</div>
