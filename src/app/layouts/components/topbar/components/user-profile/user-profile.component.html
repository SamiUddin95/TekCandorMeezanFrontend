<div class="topbar-item nav-user">
    <div class="d-lg-flex align-items-center gap-3 d-none">

        <!-- Hub / Branch Scope Badge -->
        @if (branchOrHub) {
            <div class="scope-badge" [class.scope-badge--hub]="isHubWise" [class.scope-badge--branch]="!isHubWise">
                <span class="scope-badge__dot"></span>
                <span class="scope-badge__type">{{ scopeLabel }}</span>
                <span class="scope-badge__divider"></span>
                <span class="scope-badge__names" [title]="scopeNamesTooltip">{{ scopeNamesDisplay }}</span>
            </div>
        }

        <app-theme-toggler/>

        <!-- User Info Card -->
        <div class="user-info-card">
            <div class="user-avatar">
                <span>{{ initials }}</span>
            </div>
            <div class="user-details">
                <h5 class="my-0">{{ displayName }}</h5>
                <small>Administrator</small>
            </div>
        </div>
        
        <!-- Enhanced Logout Button -->
        <button class="logout-btn" (click)="logout()">
            <ng-icon name="tablerLogout2" size="16"/>
            <span>Log Out</span>
        </button>
    </div>
</div>
