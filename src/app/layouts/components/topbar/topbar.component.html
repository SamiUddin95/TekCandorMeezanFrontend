<header class="app-topbar">
    <div class="container-fluid topbar-menu">
        <div class="d-flex align-items-center gap-2">
            <!-- Sidebar Menu Toggle Button -->
            <button (click)="toggleSidebar()" class="sidenav-toggle-button btn btn-primary btn-icon">
                <ng-icon name="tablerMenu4" class="fs-22"/>
            </button>
        </div>

        <div class="d-flex align-items-center gap-2">
            <button
                type="button"
                class="btn btn-sm d-flex align-items-center gap-2 px-2"
                [class.btn-outline-success]="(businessDayStarted$ | async) === true"
                [class.btn-outline-danger]="(businessDayStarted$ | async) === false"
                [class.btn-outline-secondary]="(businessDayStarted$ | async) === null"
                (click)="openStartBusinessDay()"
                title="Open Start Business Day">
                <span class="fw-semibold">Business Day:</span>
                <span>
                    @if ((businessDayStarted$ | async) === true) {
                        Started
                    } @else if ((businessDayStarted$ | async) === false) {
                        Not Started
                    } @else {
                        Checking...
                    }
                </span>
            </button>

            <!-- User Dropdown -->
            <app-user-profile-topbar/>
        </div>
    </div>
</header>
