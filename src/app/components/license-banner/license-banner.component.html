@if (visible && !dismissed) {
  <div class="license-banner" role="alert">
    <div class="license-banner__icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="18" height="18">
        <path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="license-banner__message">{{ message }}</div>
    <button type="button" class="license-banner__close" (click)="dismiss()" aria-label="Dismiss">
      <svg viewBox="0 0 24 24" width="14" height="14">
        <path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
}
