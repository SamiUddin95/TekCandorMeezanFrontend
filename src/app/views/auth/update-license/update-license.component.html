<div class="auth-box d-flex align-items-center">
    <div class="container-xxl position-relative">
        <div class="row align-items-center justify-content-center">
            <div class="col-xl-10">
                <div class="card rounded-4 auth-card">
                    <div class="row justify-content-between g-0">
                        <!-- Left side showing background image -->
                        <div class="col-lg-6 d-none d-lg-block">
                            <div class="h-100 position-relative rounded-start-4 auth-left-panel">
                                <div class="position-absolute w-100 h-100 auth-left-overlay"></div>
                                <div class="h-100 d-flex align-items-center justify-content-center auth-logo-container">
                                    <img src="assets/images/meezan-logo.png" alt="MEEZAN BANK" class="auth-logo">
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-6 auth-right-panel">
                            <div class="card-body">
                                <div class="auth-brand text-center mb-4">
                                    <div class="women-in-networks-logo mb-4">
                                        <h1 class="fw-bold mb-0 auth-title">
                                            <span>TEK - CANDOR</span>
                                            <span class="auth-subtitle"><u>Cheque clearing</u></span>
                                        </h1>
                                    </div>
                                    <h4 class="fw-bold mt-4 auth-welcome">Update License</h4>
                                    <p class="w-lg-75 mx-auto">Paste the encrypted license key received via email to update your application license.</p>
                                </div>

                                <form>
                                    <div class="mb-3">
                                        <label for="licenseKey" class="form-label auth-label">License Key <span class="text-danger">*</span></label>
                                        <textarea
                                            #licenseKey
                                            class="form-control"
                                            id="licenseKey"
                                            name="licenseKey"
                                            rows="6"
                                            placeholder="Paste your encrypted license key here..."
                                            [(ngModel)]="encryptedKey"
                                            required>
                                        </textarea>
                                    </div>

                                    <div class="d-grid gap-2">
                                        <button
                                            type="button"
                                            class="btn btn-primary fw-semibold py-2"
                                            (click)="onSubmit()"
                                            [disabled]="isSubmitting">
                                            @if (isSubmitting) {
                                                <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                                            }
                                            {{ isSubmitting ? 'Updating...' : 'Update License' }}
                                        </button>
                                        <button
                                            type="button"
                                            class="btn btn-outline-secondary fw-semibold py-2"
                                            (click)="onCancel()"
                                            [disabled]="isSubmitting">
                                            Cancel
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
