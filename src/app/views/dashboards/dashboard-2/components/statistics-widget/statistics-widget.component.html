<div class="banking-stats-card">
    <div class="card-icon-section">
        @if (item.chartOptions) {
        <div class="icon-chart">
            <app-echart [getOptions]="item.chartOptions" height="40px" width="40px"/>
        </div>
        }
    </div>
    
    <div class="card-content">
        <div class="card-header">
            <span class="card-title">{{ item.title }}</span>
            @if (item.badge) {
            <span [class]="`status-badge badge-${item.badge.variant}`">{{ item.badge.text }}</span>
            }
        </div>
        
        <div class="card-metrics">
            <div class="main-number">
                {{ item.prefix }}<span [countUp]="item.value">0</span>{{ item.suffix }}
            </div>
            <div class="sub-text">{{ item.description }}</div>
        </div>
        
        <div class="card-footer">
            <div class="amount-info">
                <span class="amount-label">Amount</span>
                <span class="amount-value">{{ getAmountForCard(item.title) | currency:'USD':'symbol':'1.0-0' }}</span>
            </div>
        </div>
    </div>
</div>
