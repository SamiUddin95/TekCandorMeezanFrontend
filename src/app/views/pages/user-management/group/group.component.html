<div class="row mt-2">
    <div class="col-lg-12">
        <div class="card">
            <div class="card-header bg-light d-flex justify-content-between align-items-center">
                <h5 class="card-title mb-0">Group Management</h5>
                <button class="btn btn-primary btn-sm" (click)="onAddNew()" [disabled]="isLoading">ADD NEW</button>
            </div>

            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label mb-1">Search (Name/Description)</label>
                        <input
                            type="text"
                            class="form-control form-control-sm"
                            placeholder="Search by name or description..."
                            [(ngModel)]="searchName" [disabled]="isLoading" />
                    </div>
                </div>

                <!-- Loading Indicator -->
                <div *ngIf="isLoading">
                    <app-spinner></app-spinner>
                </div>

                <!-- Groups Table -->
                <div *ngIf="!isLoading" class="table-responsive">
                    <table class="table table-hover table-striped table-sm">
                        <thead class="bg-light">
                            <tr>
                                <th style="width: 25%;">NAME</th>
                                <th style="width: 45%;">DESCRIPTION</th>
                                <th style="width: 10%;">Limit</th>
                                <th style="width: 15%;">ACTION</th>
                            </tr>
                        </thead>
                        <tbody class="table-group-divider">
                            <tr *ngFor="let group of paginatedGroups; let i = index">
                                <td style="width: 25%;">{{ group.name || 'N/A' }}</td>
                                <td style="width: 45%;">{{ group.description || 'No description' }}</td>
                                <td style="width: 10%;">{{ group.upperLimit ?? group.upperlimit ?? 'N/A' }}</td>
                                <td style="width: 15%;">
                                    <div class="btn-group btn-group-sm" role="group">
                                        <button class="btn btn-outline-primary btn-sm" (click)="onEdit(group)" [disabled]="isLoading">EDIT</button>
                                        <button class="btn btn-outline-danger btn-sm" (click)="onDelete(group)" [disabled]="isLoading">DEL</button>
                                    </div>
                                </td>
                            </tr>
                            <tr *ngIf="paginatedGroups.length === 0 && !isLoading">
                                <td colspan="4" class="text-center text-muted py-3">No records found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- Pagination Component -->
                <div class="mt-3" *ngIf="!isLoading">
                    <app-pagination 
                        [currentPage]="currentPage"
                        [pageSize]="pageSize"
                        [totalRecords]="totalRecords"
                        (pageChange)="onPageChange($event)">
                    </app-pagination>
                </div>
            </div>
        </div>
    </div>
</div>
