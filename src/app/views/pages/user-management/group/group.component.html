<div class="row mt-2">
    <div class="col-lg-12">
        <div class="card">
            <div class="card-header bg-light d-flex justify-content-between align-items-center">
                <h5 class="card-title mb-0">Group Management</h5>
                <button class="btn btn-primary btn-sm" (click)="onAddNew()" [disabled]="isLoading">ADD NEW</button>
            </div>

            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label mb-1">Search (Name/Description)</label>
                        <input
                            type="text"
                            class="form-control form-control-sm"
                            placeholder="Search by name or description..."
                            [(ngModel)]="searchName" [disabled]="isLoading" />
                    </div>
                </div>

                <!-- Loading Indicator -->
                <div *ngIf="isLoading">
                    <app-spinner></app-spinner>
                </div>

                <!-- Groups Table -->
                <div *ngIf="!isLoading" class="table-responsive">
                    <table class="table table-hover table-striped table-sm">
                        <thead class="bg-light">
                            <tr>
                                <th style="width: 25%;">NAME</th>
                                <th style="width: 45%;">DESCRIPTION</th>
                                <th style="width: 15%;">ACTION</th>
                            </tr>
                        </thead>
                        <tbody class="table-group-divider">
                            <tr *ngFor="let group of paginatedGroups; let i = index">
                                <td style="width: 25%;">{{ group.name || 'N/A' }}</td>
                                <td style="width: 45%;">{{ group.description || 'No description' }}</td>
                                
                                <td style="width: 15%;">
                                    <div class="btn-group btn-group-sm" role="group">
                                        <button class="btn btn-outline-primary btn-sm" (click)="onEdit(group)" [disabled]="isLoading">EDIT</button>
                                        <button class="btn btn-outline-danger btn-sm" (click)="onDelete(group)" [disabled]="isLoading">DEL</button>
                                    </div>
                                </td>
                            </tr>
                            <tr *ngIf="paginatedGroups.length === 0 && !isLoading">
                                <td colspan="4" class="text-center text-muted py-3">No records found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- Pagination Component -->
                <div class="mt-3" *ngIf="!isLoading">
                    <app-pagination 
                        [currentPage]="currentPage"
                        [pageSize]="pageSize"
                        [totalRecords]="totalRecords"
                        (pageChange)="onPageChange($event)">
                    </app-pagination>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Group Modal -->
<div class="modal fade" id="groupModal" tabindex="-1" aria-labelledby="groupModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content rounded-4">
            <div class="modal-header bg-light rounded-top-4">
                <h5 class="modal-title" id="groupModalLabel">{{ isEditMode ? 'Edit Group' : 'Add New Group' }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body bg-light">
                <form>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="groupName" class="form-label">Name</label>
                            <input type="text" class="form-control rounded-3" id="groupName" placeholder="Enter group name" [(ngModel)]="selectedGroup.name" name="groupName">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="groupDescription" class="form-label">Description</label>
                            <input type="text" class="form-control rounded-3" id="groupDescription" placeholder="Enter description" [(ngModel)]="selectedGroup.description" name="groupDescription">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer bg-light rounded-bottom-4">
                <button type="button" class="btn btn-secondary rounded-3" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary rounded-3" (click)="onSave()" [disabled]="isLoading">{{ isEditMode ? 'Update Group' : 'Add Group' }}</button>
            </div>
        </div>
    </div>
</div>
