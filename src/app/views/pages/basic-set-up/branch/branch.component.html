<div class="row mt-2">
  <div class="col-lg-12">
    <div class="card">
      <div class="card-header bg-light d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0">Branch</h5>
        <button class="btn btn-primary btn-sm" (click)="onAddNew()">ADD</button>
      </div>

      <div class="card-body">
        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label mb-1">Search (Name)</label>
            <input
              type="text"
              class="form-control form-control-sm"
              placeholder="Search by name..."
              [(ngModel)]="searchName" />
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-hover table-striped table-sm">
            <thead class="bg-light">
              <tr>
                <th style="width: 20%;">Name</th>
                <th style="width: 15%;">Branch Code</th>
                <th style="width: 15%;">Hub</th>
                <th style="width: 15%;">Nift Branch Code</th>
                <th style="width: 20%;">Action</th>
              </tr>
            </thead>
            <tbody class="table-group-divider">
              <tr *ngFor="let branch of paginatedBranches">
                <td>{{ branch.name }}</td>
                <td>{{ branch.code }}</td>
                <td>{{ getHubName(branch.hubId) }}</td>
                <td>{{ branch.niftBranchCode }}</td>
                <td>
                  <div class="btn-group btn-group-sm" role="group">
                    <button class="btn btn-outline-primary btn-sm" (click)="onEdit(branch)">EDIT</button>
                    <button class="btn btn-outline-danger btn-sm" (click)="onDelete(branch)">DEL</button>
                  </div>
                </td>
              </tr>
              <tr *ngIf="isLoading">
                <td colspan="5">
                  <app-spinner></app-spinner>
                </td>
              </tr>
              <tr *ngIf="!isLoading && paginatedBranches.length === 0">
                <td colspan="5" class="text-center text-muted py-3">
                  No records found
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        
        <!-- Pagination Component -->
        <div class="mt-3">
          <app-pagination 
            [currentPage]="currentPage"
            [pageSize]="pageSize"
            [totalRecords]="totalRecords"
            (pageChange)="onPageChange($event)">
          </app-pagination>
        </div>
        
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="branchModal" tabindex="-1" aria-labelledby="branchModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-xl">
    <div class="modal-content rounded-4">
      <div class="modal-header bg-light rounded-top-4">
        <h5 class="modal-title" id="branchModalLabel">{{ isEditMode ? 'Edit Branch' : 'Add Branch' }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body bg-light">
        <form>
          <div class="row">
            <div class="col-md-4 mb-3">
              <label for="branchName" class="form-label">Name</label>
              <input
                id="branchName"
                type="text"
                class="form-control rounded-3"
                [(ngModel)]="selectedBranch.name"
                name="branchName"
                placeholder="Enter branch name" />
            </div>
            <div class="col-md-4 mb-3">
              <label for="branchCode" class="form-label">Code</label>
              <input
                id="branchCode"
                type="text"
                class="form-control rounded-3"
                [(ngModel)]="selectedBranch.code"
                name="branchCode"
                placeholder="Enter branch code" />
            </div>
            <div class="col-md-4 mb-3">
              <label for="niftBranchCode" class="form-label">Nift Branch Code</label>
              <input
                id="niftBranchCode"
                type="text"
                class="form-control rounded-3"
                [(ngModel)]="selectedBranch.niftBranchCode"
                name="niftBranchCode"
                placeholder="Enter NIFT branch code" />
            </div>
          </div>
          
          <div class="row">
            <div class="col-md-4 mb-3">
              <label for="hubId" class="form-label">Hub</label>
              <select
                id="hubId"
                class="form-select rounded-3"
                [(ngModel)]="selectedBranch.hubId"
                name="hubId">
                <option value="">Select Hub</option>
                <option *ngFor="let hub of hubOptions" [value]="hub.id">{{ hub.name }}</option>
              </select>
            </div>
            <div class="col-md-4 mb-3">
              <label for="email1" class="form-label">Email 1</label>
              <input
                id="email1"
                type="email"
                class="form-control rounded-3"
                [(ngModel)]="selectedBranch.email1"
                name="email1"
                placeholder="Enter email 1" />
            </div>
            <div class="col-md-4 mb-3">
              <label for="email2" class="form-label">Email 2</label>
              <input
                id="email2"
                type="email"
                class="form-control rounded-3"
                [(ngModel)]="selectedBranch.email2"
                name="email2"
                placeholder="Enter email 2" />
            </div>
          </div>

          <div class="row">
            <div class="col-md-4 mb-3">
              <label for="email3" class="form-label">Email 3</label>
              <input
                id="email3"
                type="email"
                class="form-control rounded-3"
                [(ngModel)]="selectedBranch.email3"
                name="email3"
                placeholder="Enter email 3" />
            </div>
            <div class="col-md-4 mb-3">
              <!-- Empty column for spacing -->
            </div>
            <div class="col-md-4 mb-3">
              <!-- Empty column for spacing -->
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer bg-light rounded-bottom-4">
        <button type="button" class="btn btn-secondary rounded-3" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary rounded-3" (click)="onSave()">{{ isEditMode ? 'Update' : 'Add' }}</button>
      </div>
    </div>
  </div>
</div>
