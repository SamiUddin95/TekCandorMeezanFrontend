<div class="row mt-2">
  <div class="col-lg-12">
    <div class="card">
      <div class="card-header bg-light d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0">Cycle</h5>
        <button class="btn btn-primary btn-sm" (click)="onAddNew()">ADD</button>
      </div>

      <div class="card-body">
        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label mb-1">Search (Name)</label>
            <input
              type="text"
              class="form-control form-control-sm"
              placeholder="Search by name..."
              [(ngModel)]="searchName" />
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-hover table-striped table-sm">
            <thead class="bg-light">
              <tr>
                <th style="width: 45%;">Name</th>
                <th style="width: 35%;">Code</th>
                <th style="width: 20%;">Action</th>
              </tr>
            </thead>
            <tbody class="table-group-divider">
              <tr *ngFor="let cycle of paginatedCycles">
                <td>{{ cycle.name }}</td>
                <td>{{ cycle.code }}</td>
                <td>
                  <div class="btn-group btn-group-sm" role="group">
                    <button class="btn btn-outline-primary btn-sm" (click)="onEdit(cycle)">EDIT</button>
                    <button class="btn btn-outline-danger btn-sm" (click)="onDelete(cycle)">DEL</button>
                  </div>
                </td>
              </tr>
              <tr *ngIf="paginatedCycles.length === 0">
                <td colspan="3" class="text-center text-muted py-3">
                  <span *ngIf="isLoading">Loading...</span>
                  <span *ngIf="!isLoading">No records found</span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        
        <!-- Pagination Component -->
        <div class="mt-3">
          <app-pagination 
            [currentPage]="currentPage"
            [pageSize]="pageSize"
            [totalRecords]="totalRecords"
            (pageChange)="onPageChange($event)">
          </app-pagination>
        </div>
        
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="cycleModal" tabindex="-1" aria-labelledby="cycleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content rounded-4">
      <div class="modal-header bg-light rounded-top-4">
        <h5 class="modal-title" id="cycleModalLabel">{{ isEditMode ? 'Edit Cycle' : 'Add Cycle' }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body bg-light">
        <form>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="cycleName" class="form-label">Name</label>
              <input
                id="cycleName"
                type="text"
                class="form-control rounded-3"
                [(ngModel)]="selectedCycle.name"
                name="cycleName"
                placeholder="Enter name" />
            </div>
            <div class="col-md-6 mb-3">
              <label for="cycleCode" class="form-label">Code</label>
              <input
                id="cycleCode"
                type="text"
                class="form-control rounded-3"
                [(ngModel)]="selectedCycle.code"
                name="cycleCode"
                placeholder="Enter code" />
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer bg-light rounded-bottom-4">
        <button type="button" class="btn btn-secondary rounded-3" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary rounded-3" (click)="onSave()">{{ isEditMode ? 'Update' : 'Add' }}</button>
      </div>
    </div>
  </div>
</div>
