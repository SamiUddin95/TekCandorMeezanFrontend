<div class="row mt-2">
  <div class="col-lg-12">
    <div class="card">
      <div class="card-header bg-light d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0">Hub</h5>
        <button class="btn btn-primary btn-sm" (click)="onAddNew()">ADD</button>
      </div>

      <div class="card-body">
        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label mb-1">Search (Name)</label>
            <input
              type="text"
              class="form-control form-control-sm"
              placeholder="Search by name..."
              [(ngModel)]="searchName" />
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-hover table-striped table-sm">
            <thead class="bg-light">
              <tr>
                <th style="width: 25%;">Hub Code</th>
                <th style="width: 50%;">Name</th>
                <th style="width: 25%;">Action</th>
              </tr>
            </thead>
            <tbody class="table-group-divider">
              <tr *ngFor="let hub of paginatedHubs">
                <td>{{ hub.code }}</td>
                <td>{{ hub.name }}</td>
                <td>
                  <div class="btn-group btn-group-sm" role="group">
                    <button class="btn btn-outline-primary btn-sm" (click)="onEdit(hub)">EDIT</button>
                    <button class="btn btn-outline-danger btn-sm" (click)="onDelete(hub)">DEL</button>
                  </div>
                </td>
              </tr>
              <tr *ngIf="isLoading">
                <td colspan="3">
                  <app-spinner></app-spinner>
                </td>
              </tr>
              <tr *ngIf="!isLoading && paginatedHubs.length === 0">
                <td colspan="3" class="text-center text-muted py-3">
                  No records found
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        
        <!-- Pagination Component -->
        <div class="mt-3">
          <app-pagination 
            [currentPage]="currentPage"
            [pageSize]="pageSize"
            [totalRecords]="totalRecords"
            (pageChange)="onPageChange($event)">
          </app-pagination>
        </div>
        
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="hubModal" tabindex="-1" aria-labelledby="hubModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-xl">
    <div class="modal-content rounded-4">
      <div class="modal-header bg-light rounded-top-4">
        <h5 class="modal-title" id="hubModalLabel">{{ isEditMode ? 'Edit Hub' : 'Add Hub' }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body bg-light">
        <form>
          <div class="row">
            <div class="col-md-4 mb-3">
              <label for="hubCode" class="form-label">Code</label>
              <input
                id="hubCode"
                type="text"
                class="form-control rounded-3"
                [(ngModel)]="selectedHub.code"
                name="hubCode"
                placeholder="Enter hub code" />
            </div>
            <div class="col-md-4 mb-3">
              <label for="hubName" class="form-label">Name</label>
              <input
                id="hubName"
                type="text"
                class="form-control rounded-3"
                [(ngModel)]="selectedHub.name"
                name="hubName"
                placeholder="Enter hub name" />
            </div>
            <div class="col-md-4 mb-3">
              <label for="creditAccountSameDay" class="form-label">Credit Account Same Day</label>
              <input
                id="creditAccountSameDay"
                type="text"
                class="form-control rounded-3"
                [(ngModel)]="selectedHub.crAccSameDay"
                name="creditAccountSameDay"
                placeholder="Enter same day account" />
            </div>
          </div>
          
          <div class="row">
            <div class="col-md-4 mb-3">
              <label for="creditAccountNormal" class="form-label">Credit Account Normal</label>
              <input
                id="creditAccountNormal"
                type="text"
                class="form-control rounded-3"
                [(ngModel)]="selectedHub.crAccNormal"
                name="creditAccountNormal"
                placeholder="Enter normal account" />
            </div>
            <div class="col-md-4 mb-3">
              <label for="creditAccountIntercity" class="form-label">Credit Account Intercity</label>
              <input
                id="creditAccountIntercity"
                type="text"
                class="form-control rounded-3"
                [(ngModel)]="selectedHub.crAccIntercity"
                name="creditAccountIntercity"
                placeholder="Enter intercity account" />
            </div>
            <div class="col-md-4 mb-3">
              <label for="creditAccountDollar" class="form-label">Credit Account Dollar</label>
              <input
                id="creditAccountDollar"
                type="text"
                class="form-control rounded-3"
                [(ngModel)]="selectedHub.crAccDollar"
                name="creditAccountDollar"
                placeholder="Enter dollar account" />
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer bg-light rounded-bottom-4">
        <button type="button" class="btn btn-secondary rounded-3" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary rounded-3" (click)="onSave()">{{ isEditMode ? 'Update' : 'Add' }}</button>
      </div>
    </div>
  </div>
</div>
