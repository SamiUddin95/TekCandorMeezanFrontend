<!-- Filters Section -->
<div class="row mt-1">
  <div class="col-lg-12">
    <div class="card">
      <div class="card-header bg-light d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0">Clearing Log Report Filters</h5>
        <div class="export-buttons-group">
          <button class="export-icon-btn excel-btn" type="button" (click)="exportReport('EXCEL')">
            <div class="btn-content">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <line x1="9" y1="3" x2="9" y2="21"/>
                <line x1="15" y1="3" x2="15" y2="21"/>
                <line x1="3" y1="9" x2="21" y2="9"/>
                <line x1="3" y1="15" x2="21" y2="15"/>
              </svg>
              <span class="btn-label">Download Excel</span>
            </div>
          </button>
          <button class="export-icon-btn pdf-btn" type="button" (click)="exportReport('PDF')">
            <div class="btn-content">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14,2 14,8 20,8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="9,9 12,9 12,11"/>
              </svg>
              <span class="btn-label">Download PDF</span>
            </div>
          </button>
          <button class="export-icon-btn csv-btn" type="button" (click)="exportReport('CSV')">
            <div class="btn-content">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                <polyline points="13,2 13,9 20,9"/>
                <line x1="8" y1="13" x2="16" y2="13"/>
                <line x1="8" y1="17" x2="16" y2="17"/>
              </svg>
              <span class="btn-label">Download CSV</span>
            </div>
          </button>
        </div>
      </div>
      <div class="card-body">
        <div class="row">
          <div class="col-md-3">
            <label class="form-label mb-1">Date From</label>
            <input
              type="date"
              class="form-control form-control-sm"
              [(ngModel)]="fromDate" />
          </div>
          <div class="col-md-3">
            <label class="form-label mb-1">Date To</label>
            <input
              type="date"
              class="form-control form-control-sm"
              [(ngModel)]="toDate" />
          </div>
          <div class="col-md-3">
            <label class="form-label mb-1">Hub</label>
            <select
              class="form-select form-select-sm"
              [(ngModel)]="selectedHubId">
              <option [value]="null">All Hubs</option>
              <option *ngFor="let hub of hubs" [value]="hub.code">
                {{ hub.name }}
              </option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label mb-1">Clearing Cycle</label>
            <select
              class="form-select form-select-sm"
              [(ngModel)]="selectedCycleId">
              <option [value]="null">All Cycles</option>
              <option *ngFor="let cycle of cycles" [value]="cycle.id">
                {{ cycle.name }}
              </option>
            </select>
          </div>
        </div>
        <div class="row mt-2">
          <div class="col-md-12 d-flex justify-content-end gap-2">
            <button class="btn btn-outline-secondary px-3 py-2" (click)="onReset()">
              <ng-icon name="tablerRefresh" class="me-1"></ng-icon>
              Reset filter
            </button>
            <button class="btn btn-primary px-3 py-2" [disabled]="isReportLoading" (click)="onSearch()">
              @if (isReportLoading) {
                <span class="spinner-border spinner-border-sm me-1"></span> Searching...
              } @else {
                <ng-icon name="tablerSearch" class="me-1"></ng-icon>
                Search
              }
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Report Preview Section -->
<div class="row">
  <div class="col-lg-12">
    <div class="card">
      <div class="card-body p-0">

        @if (!showReport) {
          <div class="text-center text-muted py-5">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#dee2e6" stroke-width="1.5" class="mb-3 d-block mx-auto">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14,2 14,8 20,8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            <p class="mb-0">Apply filters and click <strong>Search</strong> to view the SSRS report</p>
          </div>
        }

        @if (showReport) {
          <div class="ssrs-viewer">
            @if (isReportLoading) {
              <div class="ssrs-viewer__loading">
                <app-spinner></app-spinner>
                <p class="mt-2 mb-0 text-muted">Loading report, please wait…</p>
              </div>
            }
            <iframe
              class="ssrs-viewer__iframe"
              [src]="reportUrl | safeUrl"
              (load)="onReportLoad()"
              frameborder="0"
              allowfullscreen>
            </iframe>
          </div>
        }

      </div>
    </div>
  </div>
</div>
