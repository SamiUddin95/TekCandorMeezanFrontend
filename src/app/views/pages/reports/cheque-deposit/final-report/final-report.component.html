<!-- Filters Section -->
<div class="row mt-1">
  <div class="col-lg-12">
    <div class="card">
      <div class="card-header bg-light">
        <h5 class="card-title mb-0">Final Report Filters</h5>
      </div>
      <div class="card-body">
        <div class="row">
          <div class="col-md-3">
            <label class="form-label mb-1">Date From</label>
            <input
              type="date"
              class="form-control form-control-sm"
              [(ngModel)]="fromDate" />
          </div>
          <div class="col-md-3">
            <label class="form-label mb-1">Date To</label>
            <input
              type="date"
              class="form-control form-control-sm"
              [(ngModel)]="toDate" />
          </div>
          <div class="col-md-3">
            <label class="form-label mb-1">Clearing Cycle</label>
            <select
              class="form-select form-select-sm"
              [(ngModel)]="selectedCycleId">
              <option [value]="null">All Cycles</option>
              <option *ngFor="let cycle of cycles" [value]="cycle.id">
                {{ cycle.name }}
              </option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label mb-1">Branch</label>
            <select
              class="form-select form-select-sm"
              [(ngModel)]="selectedBranchId">
              <option [value]="null">All Branches</option>
              <option *ngFor="let branch of branches" [value]="branch.id">
                {{ branch.name }}
              </option>
            </select>
          </div>
        </div>
        <div class="row mt-2">
          <div class="col-md-3 d-flex align-items-end gap-2">
            <button class="btn btn-primary btn-sm" (click)="onSearch()">
              Search
            </button>
            <button class="btn btn-secondary btn-sm" (click)="onReset()">
              Reset
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Table Section -->
<div class="row">
  <div class="col-lg-12">
    <div class="card">
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-hover table-striped table-sm">
            <thead class="bg-light">
              <tr>
                <th>Status</th>
                <th>Cheque Number</th>
                <th>Amount</th>
              </tr>
            </thead>
            <tbody class="table-group-divider">
              <tr *ngFor="let item of paginatedReportData">
                <td>
                  <span>
                    {{ getStatusText(item.status) }}
                  </span>
                </td>
                <td>{{ item.chequeNumber }}</td>
                <td>{{ item.amount | number:'1.0-0' }}</td>
              </tr>
              <tr *ngIf="paginatedReportData.length === 0">
                <td colspan="3" class="text-center text-muted py-3">
                  <span *ngIf="isLoading">Loading...</span>
                  <span *ngIf="!isLoading">Please apply filters and click Search to view data</span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        
        <!-- Pagination Component -->
        <div class="mt-3" *ngIf="totalRecords > 0">
          <app-pagination 
            [currentPage]="currentPage"
            [pageSize]="pageSize"
            [totalRecords]="totalRecords"
            (pageChange)="onPageChange($event)">
          </app-pagination>
        </div>
        
      </div>
    </div>
  </div>
</div>
