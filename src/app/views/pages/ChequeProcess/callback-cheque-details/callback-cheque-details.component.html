<div class="mt-1">
 
  <div class="card mb-1">
    <div class="card-header">
      <div class="d-flex align-items-center">
          <button class="btn btn-sm btn-outline-secondary me-2" (click)="goBack()">
            <ng-icon name="tablerArrowLeft"></ng-icon>
          </button>
          <h6 class="card-title mb-0">
            Callback Cheque Details
          </h6>
      </div>
    </div>
    <div class="card-body">
      <div class="row g-1">
        <div class="col-md-3">
          <label class="form-label mb-0">Cheque Number</label>
          <input type="text" 
                 class="form-control" 
                 [(ngModel)]="chequeDetails.chequeNumber"
                 placeholder="8 digits"
                 maxlength="8">
        </div>

        <div class="col-md-3">
          <label class="form-label mb-0">Account Number</label>
          <input type="text" 
                 class="form-control" 
                 [(ngModel)]="chequeDetails.accountNumber"
                 placeholder="16 digits"
                 maxlength="16">
        </div>

        <div class="col-md-3">
          <label class="form-label mb-0">Amount</label>
          <input type="text" 
                 class="form-control" 
                 [value]="chequeDetails.amount || ''"
                 readonly>
        </div>

        <div class="col-md-3">
          <label class="form-label mb-0">Status</label>
          <input type="text" 
                 class="form-control" 
                 [value]="chequeDetails.status || ''"
                 readonly>
        </div>

        <div class="col-md-3">
          <label class="form-label mb-0">Account Title</label>
          <input type="text" 
                 class="form-control" 
                 [value]="chequeDetails.accountTitle || chequeDetails.customerName || ''"
                 readonly>
        </div>

        <div class="col-md-3">
          <label class="form-label mb-0">Account Balance</label>
          <input type="text" 
                 class="form-control" 
                 [value]="chequeDetails.accountBalance || ''"
                 readonly>
        </div>

        <div class="col-md-3">
          <label class="form-label mb-0">CBC Status</label>
          <select class="form-select" [(ngModel)]="chequeDetails.cbcStatus">
            <option value="">Select CBC Status</option>
            <option value="pending">Pending</option>
            <option value="processing">Processing</option>
            <option value="completed">Completed</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label mb-0">Error Field Name</label>
          <textarea class="form-control" 
                    rows="1" 
                    readonly>{{ chequeDetails.errorFieldsName || '' }}</textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- Images Section -->
  <div class="row g-1 mb-1">
    <!-- Cheque Images -->
    <div class="col-md-6">
      <div class="card">
        <div class="card-header">
          <h6 class="card-title mb-0">Cheque Images</h6>
        </div>
        <div class="card-body p-2">
          <div id="chequeCarousel" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
              <div class="carousel-item active">
                <img [src]="chequeDetails.imagePath + '/' + (chequeDetails.imgF || '')"
                     class="d-block w-100"
                     alt="Cheque Front"
                     (error)="onImageError($event)">
              </div>
              <div class="carousel-item">
                <img [src]="chequeDetails.imagePath + '/' + (chequeDetails.imgR || '')"
                     class="d-block w-100"
                     alt="Cheque Back"
                     (error)="onImageError($event)">
              </div>
              <div class="carousel-item" *ngIf="chequeDetails.imgU">
                <img [src]="chequeDetails.imagePath + '/' + chequeDetails.imgU"
                     class="d-block w-100"
                     alt="Cheque UV"
                     (error)="onImageError($event)">
              </div>
            </div>
            <button class="carousel-control-prev" type="button"
                    data-bs-target="#chequeCarousel"
                    data-bs-slide="prev">
              <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button"
                    data-bs-target="#chequeCarousel"
                    data-bs-slide="next">
              <span class="carousel-control-next-icon"></span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Signature Images -->
    <div class="col-md-6">
      <div class="card">
        <div class="card-header">
          <h6 class="card-title mb-0">Signature Images</h6>
        </div>
        <div class="card-body p-2">
          <div id="signatureCarousel" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
              <div class="carousel-item active" *ngIf="chequeDetails.signature && chequeDetails.signature.length > 0">
                <img [src]="chequeDetails.imagePath + '/' + chequeDetails.signature[0]"
                     class="d-block w-100"
                     alt="Signature 1"
                     (error)="onImageError($event)">
              </div>
              <div class="carousel-item" *ngIf="chequeDetails.signature && chequeDetails.signature.length > 1">
                <img [src]="chequeDetails.imagePath + '/' + chequeDetails.signature[1]"
                     class="d-block w-100"
                     alt="Signature 2"
                     (error)="onImageError($event)">
              </div>
              <div class="carousel-item active" *ngIf="!chequeDetails.signature || chequeDetails.signature.length === 0">
                <div class="text-center p-4">
                  <p class="text-muted">No signatures available</p>
                </div>
              </div>
            </div>
            <button class="carousel-control-prev" type="button"
                    data-bs-target="#signatureCarousel"
                    data-bs-slide="prev">
              <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button"
                    data-bs-target="#signatureCarousel"
                    data-bs-slide="next">
              <span class="carousel-control-next-icon"></span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Actions Section -->
  <div class="card">
    <div class="card-body">
      <div class="row g-1">
        <div class="col-md-12 text-center">
          <button class="btn btn-primary" 
                  (click)="updateCallbackCheque()">
            <ng-icon name="tablerRefresh" class="me-1"></ng-icon>
            Update
          </button>
        </div>
      </div>
    </div>
  </div>

</div>
